name: Generate Protobuf

on:
  push:
    branches: ["main"]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate
        run: |
          mkdir -p out
          protoc \
            --go_out=out --go_opt=module=github.com/tolik-tachyon/proto-generated \
            --go-grpc_out=out --go-grpc_opt=module=github.com/tolik-tachyon/proto-generated \
            payment/payment.proto

      - name: Push
        env:
          TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git clone https://x-access-token:${TOKEN}@github.com/tolik-tachyon/proto-generated.git

          rm -rf proto-generated/* || true
          cp -r out/* proto-generated/

          cd proto-generated
          git add .
          git commit -m "auto generate proto" || echo "no changes"
          git push