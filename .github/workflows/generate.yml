name: Generate Protobuf

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Setup Go (NO CACHE)
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false   # 🔥 CRITICAL FIX

      - name: Install plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate protobuf
        run: |
          rm -rf gen
          mkdir -p gen

          protoc \
            -I . \
            --go_out=gen \
            --go_opt=paths=source_relative \
            --go-grpc_out=gen \
            --go-grpc_opt=paths=source_relative \
            payment/payment.proto

      - name: Clone target repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/tolik-tachyon/proto-generated.git

      - name: Sync generated files
        run: |
          rm -rf proto-generated/paymentpb
          mkdir -p proto-generated/paymentpb
          cp -r gen/payment/*.pb.go proto-generated/paymentpb/ || true

      - name: Init Go module (safe)
        run: |
          cd proto-generated

          rm -f go.mod go.sum

          go mod init github.com/tolik-tachyon/proto-generated

          go mod tidy

      - name: Commit & push
        run: |
          cd proto-generated

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .

          git commit -m "auto generate proto" || echo "no changes"

          git push origin main