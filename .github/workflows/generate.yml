name: Generate Protobuf

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate protobuf (direct into output repo structure)
        run: |
          mkdir -p out
          protoc \
            -I . \
            --go_out=out \
            --go_opt=paths=source_relative \
            --go-grpc_out=out \
            --go-grpc_opt=paths=source_relative \
            payment/payment.proto

      - name: Clone target repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/tolik-tachyon/proto-generated.git

      - name: Sync output
        run: |
          rm -rf proto-generated/payment
          cp -r out/payment proto-generated/

      - name: Commit & push
        run: |
          cd proto-generated
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "auto generate proto" || echo "no changes"
          git push origin main