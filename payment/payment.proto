syntax = "proto3";

package paymentpb;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/tolik-tachyon/proto-generated/paymentpb";

service PaymentService {
  rpc ProcessPayment(PaymentRequest) returns (PaymentResponse);
  rpc SubscribePaymentStatus(PaymentRequest) returns (stream PaymentResponse);
  rpc ListPayment(ListPaymentRequest) returns (ListPaymentResponse);
}

message PaymentRequest {
  string order_id = 1;
  int64 amount = 2;
}

message PaymentResponse {
  string status = 1;
  string transaction_id = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message ListPaymentRequest {
  string status = 1;
}

message ListPaymentResponse {
  repeated PaymentResponse payments = 1;
}